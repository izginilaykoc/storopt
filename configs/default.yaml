# storopt default configuration — DK1 market, Horns Rev 1 wind plant, HiGHS solver.
# Override any field in a case-specific YAML (e.g. horns_rev1.yaml) or via
# load_config("default.yaml", **{"scenarios.method": "naive"}).

ingestion:
  # Energinet area code for DK1 (West Denmark / Nordpool)
  area: "DK1"
  # ENTSO-E bidding zone for generation data
  entsoe_area: "10YDK-1--------W"
  # Plant EIC — override in case config
  plant_eic: ""
  # Pre-fetched generation parquet file (optional; used when ENTSO-E REST is unavailable)
  generation_file: ""
  # Weather coordinates — override in case config
  weather_lat: 0.0
  weather_lon: 0.0
  # Local Parquet cache directory
  cache_dir: "./data/cache"
  # Number of calendar days of history to fetch before the target date
  history_days: 730

bess:
  power_charge_mw: 1.0
  power_discharge_mw: 1.0
  energy_capacity_mwh: 2.0
  soc_min_frac: 0.10
  soc_max_frac: 0.90
  soc_init_frac: 0.50
  eta_charge: 0.95
  eta_discharge: 0.95
  deg_cost_eur_per_mwh: 10.0
  # Maximum full-equivalent cycles per day — null = unconstrained
  max_cycles_per_day: null

market:
  n_periods: 24
  dt_hours: 1.0
  da_price_floor_eur: -500.0
  da_price_ceil_eur: 4000.0

scenarios:
  # "knn" or "naive"
  method: "knn"
  n_scenarios: 20
  params:
    # "softmax" | "uniform" | "inverse_distance"
    probability_mode: "softmax"
    softmax_temperature: 1.0
    # Per-feature multipliers for KNN weighted-Euclidean distance.
    # Keys must match exact feature column names produced by _build_query_vector()
    # (e.g. "calendar_month", "weather_wind_speed_80m_mean", "lag1_da_mean").
    # Unknown keys are silently ignored; unlisted features default to weight 1.0.
    # Leave empty ({}) for uniform weighting across all features.
    feature_weights: {}

optimizer:
  # "stochastic_milp" or "deterministic"
  method: "stochastic_milp"
  cvar_enabled: false
  cvar_alpha: 0.95
  cvar_weight: 0.0

solver:
  # "highs" or "gurobi"
  name: "highs"
  time_limit_s: 300
  mip_gap: 0.001
  threads: null

backtest:
  vss_enabled: true
  # EVPI requires one full solve per scenario — expensive; disable unless needed
  evpi_enabled: false
